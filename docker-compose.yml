# docker-compose.yml

# This file is for production mode only.

services:
  web_ai:
    build: .
    image: cornatul/webai.ai
    container_name: web_ai_server
    restart: always
    ports:
      - "6969:6969"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Empty by default = auth disabled. Set in .env or override via shell:
      #   GEMINI_API_KEY=xxx docker-compose up
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    networks:
      - app_net
    command: >
      sh -c "
        uvicorn app.main:app --host 0.0.0.0 --port 6969 --workers 4 --log-level info;
      "

networks:
  app_net:
    external: true
    name: ${DOCKER_NETWORK:-1panel-network}
